name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: kinetik
          POSTGRES_PASSWORD: kinetik_ci
          POSTGRES_DB: kinetik_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kinetik -d kinetik_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps (GDAL)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements/dev.txt
          pip install -r backend/requirements/base.txt

      - name: Run tests with PostGIS
        env:
          DJANGO_SETTINGS_MODULE: core.settings.ci
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: kinetik_test
          DB_USER: kinetik
          DB_PASSWORD: kinetik_ci
        run: |
          cd backend
          pytest --cov=apps --cov-report=term --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  test-backend-sqlite:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements/dev.txt
          pip install -r backend/requirements/base.txt

      - name: Run tests with SQLite (mocked GIS)
        env:
          DJANGO_SETTINGS_MODULE: core.settings.test
        run: |
          cd backend
          pytest -v --cov=apps --cov-report=term
