services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: kinetik
      POSTGRES_USER: kinetik
      POSTGRES_PASSWORD: kinetik_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinetik"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ../../backend
      dockerfile: ../docker/dev/Dockerfile
    command: gunicorn core.wsgi:application --reload -w 4 -b 0.0.0.0:8000
    volumes:
      - ../../backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  daphne:
    build:
      context: ../../backend
      dockerfile: ../docker/dev/Dockerfile
    command: daphne -b 0.0.0.0 -p 8001 core.asgi:application
    volumes:
      - ../../backend:/app
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ../../backend
      dockerfile: ../docker/dev/Dockerfile
    command: celery -A core worker -l info --concurrency=4
    volumes:
      - ../../backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ../../backend
      dockerfile: ../docker/dev/Dockerfile
    command: celery -A core beat -l info
    volumes:
      - ../../backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    ports:
      - "8080:80"
    depends_on:
      - django
      - daphne

volumes:
  pgdata:
  static_volume:
  media_volume:
