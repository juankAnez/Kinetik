services:
  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-kinetik}
      POSTGRES_USER: ${DB_USER:-kinetik}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kinetik}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - kinetik-network

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - kinetik-network

  django:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile
    image: kinetik/django:latest
    restart: always
    environment:
      KINETIK_SERVICE: django
      DJANGO_SETTINGS_MODULE: core.settings.production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-kinetik.app,api.kinetik.app}
      DB_NAME: ${DB_NAME:-kinetik}
      DB_USER: ${DB_USER:-kinetik}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://kinetik.app,https://admin.kinetik.app}
      SENTRY_DSN: ${SENTRY_DSN:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - kinetik-network

  daphne:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile
    image: kinetik/django:latest
    restart: always
    environment:
      KINETIK_SERVICE: daphne
      DJANGO_SETTINGS_MODULE: core.settings.production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-kinetik.app,api.kinetik.app}
      DB_NAME: ${DB_NAME:-kinetik}
      DB_USER: ${DB_USER:-kinetik}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - kinetik-network

  celery:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile
    image: kinetik/django:latest
    restart: always
    environment:
      KINETIK_SERVICE: celery
      DJANGO_SETTINGS_MODULE: core.settings.production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DB_NAME: ${DB_NAME:-kinetik}
      DB_USER: ${DB_USER:-kinetik}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_WORKERS: ${CELERY_WORKERS:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - kinetik-network

  celery-beat:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile
    image: kinetik/django:latest
    restart: always
    environment:
      KINETIK_SERVICE: celery-beat
      DJANGO_SETTINGS_MODULE: core.settings.production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DB_NAME: ${DB_NAME:-kinetik}
      DB_USER: ${DB_USER:-kinetik}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - kinetik-network

  nginx:
    image: nginx:1.25-alpine
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      - django
      - daphne
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - kinetik-network

volumes:
  pgdata:
  redis_data:
  static_volume:
  media_volume:

networks:
  kinetik-network:
    driver: bridge
